<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <title>R.E.P.O.損益シミュレーター</title>

    <style>
        :root{
            background: rgb(12, 0, 16);
            --logochar: linear-gradient(180deg,rgb(253, 135, 0),rgb(255, 255, 61));
            --inputbox: linear-gradient(180deg,white,white);
            --chartbox: white;
            --chartline: black;
            --graphline1: red;
            --graphline2: red;
            --graphline3: yellow;
        }
        
        .repo-char {
            font-family: "Russo One", sans-serif;
            font-weight: 400;
            font-style: normal;
            color:var(--logochar);
            display: flex;
            padding: 10px;
        }

        .repo-char .main-title{
            font-size: 40px;
            background:var(--logochar);
            background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        .repo-char .description{
            color: rgb(255, 136, 0);
            font-size: 1rem;
            font-family: sans-serif;
            margin-top: 5px;
        }

        .input-container{
            display: flex;
            font-family: sans-serif;
            color:rgb(15, 0, 62);
            padding: 0;
        }
        
        .input-container ul{
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            height: 200px;
            width: 80%;
            gap:1rem;
            list-style: none;
            margin: 1rem;
            padding: 5px;
            background-color: aqua;
            border-radius: 10px;
        }

        .input-container input[type="text"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #b866ff;
            border-radius: 10px;
            box-sizing: border-box; /* 幅の計算を崩さないためのおまじない */
        }

        .input-container button {
            padding: 0.5rem 1rem;
            background-color: rgb(15, 0, 62);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        



        
    </style>
</head>
<body>
    <div class="repo-char">
        <div class="main-title">R.E.P.O.ProfitSimulator</div>
    </div>

    <div class="input-container">
        <ul>
            <li class="input-field"><input type="text" id="start-level" placeholder="初期レベルの設定"></li>
            <li class="input-field"><input type="text" id="count-level" placeholder="進行レベル数"></li>
        </ul>
    </div>

    <script>



    </script>
</body>
</html>
