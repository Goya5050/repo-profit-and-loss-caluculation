<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <title>R.E.P.O.損益シミュレーター</title>

    <style>
        :root{
            background: rgb(12, 0, 16);
            --logochar: linear-gradient(180deg,rgb(253, 135, 0),rgb(255, 255, 61));
            --inputbox: linear-gradient(180deg,white,white);
            --description:rgb(253, 135, 0);
            --chartbox: white;
            --chartline: black;
            --graphline1: red;
            --graphline2: red;
            --graphline3: yellow;
        }
        
        .repo-char {
            display: flex;
            padding: 10px;

            font-family: "Russo One", sans-serif;
            font-weight: 400;
            font-style: normal;

            color:var(--logochar);
        }

        .repo-char .main-title{
            font-size: 40px;
            background:var(--logochar);
            background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        .repo-char .description{
            color: rgb(255, 136, 0);
            font-size: 1rem;
            font-family: sans-serif;
            margin-top: 5px;
        }

        .input-container{
            display: flex;

            color:rgb(255, 255, 255);
            padding:1rem;
            gap:4px;
            
            background-color: rgb(135, 10, 10);
        }

        .input-container input{
            width: 45%;
            padding: 4px;
            
            font-size: 16px;
            font-family: sans-serif;
            color: coral;
            
            border: 4px solid ;
            border-color: rgb(255, 158, 2);
            border-radius: 4px;

            background-color: black;
        }

        .select-box{
            display: flex;
            width: auto;

            padding: 1rem;
            gap: 4px;

            background-color: rgb(19, 0, 38);
        }

        .select-set{
            width: 33%;
            flex-direction: column;
            flex-wrap: wrap;
        
            gap: 4px;
        }
        

        .select-box label{
            width: 100%;

            font-size: 16px;
            font-family: sans-serif;

            color: var(--description);
        }

        .select-box select{
            width: 100%;
            padding: 4px;

            font-family: sans-serif;
            font-size: 16px;
            color: rgb(255, 225, 127);

            border: 4px solid ;
            border-color: rgb(255, 158, 2);
            border-radius: 4px;

            background-color: black;
        }

        
        



        
    </style>
</head>
<body>
    <div class="repo-char">
        <div class="main-title">R.E.P.O.ProfitSimulator</div>
    </div>

    <div class="input-container">
        <input type="text" id="start-level" placeholder="初期レベルの設定">
        <input type="text" id="level-counter" placeholder="試行回数の設定">
    
    </div>
    <button onclick="sum('start-level','level-counter')" style="color: chocolate; font-family: sans-serif;">入力の和を計算</button>
    <div id="simulation-time" style="color:white; font-size:20px;"></div>
    
    <div class="select-box">
        <div class="select-set">
            <label>1つ目の武器</label>
            <select name="select_weapon_1" id="weapon_1">
                <option value="nothing" selected>選択してください</option>
                <option value="gun">ハンドガン</option>
                <option value="hammer">ハンマー</option>
                <option value="photonblaster">フォトンブラスター</option>
                <option value="baseball_bat">バット</option>
            </select>
        </div>

        <div class="select-set">
            <label>2つ目の武器</label>
            <select name="select_weapon_2" id="weapon_2">
                <option value="nothing" selected>選択してください</option>
                <option value="gun">ハンドガン</option>
                <option value="hammer">ハンマー</option>
                <option value="photonblaster">フォトンブラスター</option>
                <option value="baseball_bat">バット</option>
            </select>
        </div>

        <div class="select-set">
            <label>3つ目の武器</label>
            <select name="select_weapon_3" id="weapon_3">
                <option value="nothing" selected>選択してください</option>
                <option value="gun">ハンドガン</option>
                <option value="hammer">ハンマー</option>
                <option value="photonblaster">フォトンブラスター</option>
                <option value="baseball_bat">バット</option>
            </select>
        </div>   
    </div>

    <script>
        
        function getselect(select_weapon_id){
            const selectElement = document.getElementById(select_weapon_id);

            const selectindex = selectElement.selectindex;

            const text = selectElement.option[selectindex].text;

            const value = selectElement.value;

            alert("選択された文字列は：「" + text + "」\n");
        }

        function sum(start,count){
            const num1 = parseFloat(document.getElementById(start).value);
            const num2 = parseFloat(document.getElementById(count).value);


            document.getElementById('simulation-time').textContent=num1+num2;
        }



    </script>
</body>
</html>
